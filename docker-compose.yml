services:
  neo4j:
    image: neo4j:5.26-community
    container_name: money-flow-neo4j
    ports:
      - "7474:7474"   # HTTP Browser
      - "7687:7687"   # Bolt
    environment:
      NEO4J_AUTH: neo4j/password123
      # Allow LOAD CSV from /var/lib/neo4j/import
      NEO4J_server_directories_import: /var/lib/neo4j/import
      # Raise heap for bulk-loading 1.3M rows
      NEO4J_server_memory_heap_initial__size: 1G
      NEO4J_server_memory_heap_max__size: 2G
      NEO4J_server_memory_pagecache_size: 1G
    volumes:
      # Mount repo data/ into Neo4j's import directory
      - ../data:/var/lib/neo4j/import
      - neo4j_data:/data
      - neo4j_logs:/logs

  backend:
    build: .
    container_name: money-flow-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_NEO4J_URI: bolt://neo4j:7687
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      MONITOR_CSVPATH: /data/transactions.csv
      MONITOR_MODEL_TRAININGDATAPATH: /data/training_candidates.csv
      MONITOR_MODEL_URL: http://ml:8000
      # MONITOR_MODEL_ENABLED: "true"   # uncomment to gate rule candidates through the ml service
    volumes:
      # transactions.csv replay source + training-data collect output
      - ../data:/data
    depends_on:
      - neo4j
      - kafka
      - ml

  frontend:
    build: ../frontend
    container_name: money-flow-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

  ml:
    build: ../ml
    container_name: money-flow-ml
    ports:
      - "8000:8000"
    volumes:
      # Mount model artifacts (model.json + feature_names.json) so retraining
      # on the host is picked up on container restart without a rebuild
      - ../ml:/app

  kafka:
    image: apache/kafka:3.8.1
    container_name: money-flow-kafka
    ports:
      - "9092:9092"
    environment:
      # KRaft single-node (no Zookeeper)
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      # Three listeners: PLAINTEXT for host clients (localhost:9092),
      # INTERNAL for containers on the compose network (kafka:29092),
      # CONTROLLER for KRaft internal
      KAFKA_LISTENERS: PLAINTEXT://:9092,INTERNAL://:29092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      # Cluster ID (must be base64url, 22 chars)
      KAFKA_CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      # Topic defaults
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka_data:/var/lib/kafka/data

volumes:
  neo4j_data:
  neo4j_logs:
  kafka_data:
